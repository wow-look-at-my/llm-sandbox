name: Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  id-token: write
  pull-requests: write
  statuses: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE: ${{ github.event_name == 'pull_request' && format('/llm-sandbox/branch/pr-{0}/', github.event.number) || '/llm-sandbox/' }}

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: ./dist/

  deploy:
    needs: build
    uses: PazerOP/pr-preview-action/.github/workflows/preview.yml@master
    with:
      artifact-name: build
    secrets: inherit
